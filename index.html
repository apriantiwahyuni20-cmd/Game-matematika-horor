<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Terminal Simulator - Area 07 HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Share Tech Mono', monospace; color: #fff; }
        
        /* CRT & Bodycam Effects */
        .overlay-effects {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.6) 110%);
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 101;
            opacity: 0.3;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        .terminal-panel {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 320px; background: #111; border: 4px solid #333;
            padding: 15px; border-radius: 4px; box-shadow: 0 0 50px rgba(0,0,0,1);
            pointer-events: auto; z-index: 60;
        }

        #question-text { font-size: 32px; color: #0f0; text-shadow: 0 0 10px rgba(0,255,0,0.5); text-align: center; }

        input {
            background: #000; border: 1px solid #0f0; color: #0f0;
            text-align: center; font-size: 24px; outline: none; width: 100%;
            font-family: 'Share Tech Mono', monospace; margin-top: 10px;
        }

        .control-panel {
            position: absolute; bottom: 5%; width: 100%; display: flex;
            justify-content: space-between; padding: 0 50px; pointer-events: none;
        }

        .btn-box {
            background: #222; padding: 10px; border: 2px solid #444; border-radius: 4px;
            display: flex; flex-direction: column; gap: 10px; pointer-events: auto;
        }

        .btn {
            width: 60px; height: 60px; border: none; cursor: pointer;
            font-weight: bold; font-family: 'Share Tech Mono', monospace;
            border-bottom: 5px solid #000; transition: 0.1s;
        }
        
        .btn-door { background: #311; color: #f55; }
        .btn-door.active { background: #f00; color: #fff; transform: translateY(4px); border-bottom: none; box-shadow: 0 0 20px #f00; }
        
        .btn-light { background: #333; color: #fff; }
        .btn-light.active { background: #fff; color: #000; transform: translateY(4px); border-bottom: none; box-shadow: 0 0 20px #fff; }

        #jumpscare-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: none;
            justify-content: center; align-items: center;
        }

        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 70;
        }
    </style>
</head>
<body>

<div class="overlay-effects"></div>
<div class="scanlines"></div>

<div id="start-screen">
    <div class="mb-6 opacity-50 text-xs">SISTEM OPERASI TERMINAL v5.0.2 - HD REVISION</div>
    <h1 class="text-4xl font-bold tracking-[0.5em] mb-10 text-white">BUNKER SEKTOR 07</h1>
    <button onclick="bootSystem()" class="px-12 py-4 bg-transparent border-2 border-white hover:bg-white hover:text-black transition-all font-bold uppercase">
        Inisialisasi Sistem
    </button>
</div>

<div id="hud">
    <div class="bg-black/80 p-4 border border-white/20 backdrop-blur-sm">
        <div class="text-[10px] text-gray-500 uppercase tracking-widest">Status Daya</div>
        <div class="text-2xl font-bold" id="power-val">100%</div>
        <div class="text-[10px] mt-2 text-red-600">TIME: <span id="clock-val">12</span>:00 AM</div>
    </div>
    <div class="text-right">
        <div class="text-red-500 animate-pulse text-xs font-bold">● LIVE FEED [CAM-HD-01]</div>
        <div class="text-[9px] text-gray-400">RESOLUSI: 1080p | STABILITAS: TINGGI</div>
    </div>
</div>

<div class="control-panel">
    <div class="btn-box">
        <div class="text-[10px] text-center text-gray-500">PINTU KIRI</div>
        <button id="door-l" class="btn btn-door" onclick="toggleDoor('L')">DOOR</button>
        <button id="light-l" class="btn btn-light" onmousedown="handleLight('L', true)" onmouseup="handleLight('L', false)" onmouseleave="handleLight('L', false)">LIGHT</button>
    </div>
    <div class="btn-box">
        <div class="text-[10px] text-center text-gray-500">PINTU KANAN</div>
        <button id="door-r" class="btn btn-door" onclick="toggleDoor('R')">DOOR</button>
        <button id="light-r" class="btn btn-light" onmousedown="handleLight('R', true)" onmouseup="handleLight('R', false)" onmouseleave="handleLight('R', false)">LIGHT</button>
    </div>
</div>

<div class="terminal-panel">
    <div class="text-[9px] text-green-700 mb-2 font-bold tracking-widest uppercase">Repel Protocol: Masukkan Jawaban</div>
    <div id="question-text">-- + --</div>
    <input type="number" id="input-box" placeholder="Ketik Jawaban..." autocomplete="off">
</div>

<div id="jumpscare-layer">
    <svg id="monster-svg" viewBox="0 0 200 200" width="100%" height="100%">
        <rect width="200" height="200" fill="black" />
        <g id="scare-elements">
            <!-- Wajah Detail Jumpscare -->
            <path d="M 30 40 Q 100 0 170 40 L 180 160 Q 100 200 20 160 Z" fill="#202020" />
            <!-- Mata detail -->
            <circle cx="65" cy="75" r="18" fill="#fff" />
            <circle cx="135" cy="75" r="18" fill="#fff" />
            <circle cx="65" cy="75" r="8" fill="#f00" />
            <circle cx="135" cy="75" r="8" fill="#f00" />
            <!-- Pupil kecil -->
            <circle cx="65" cy="75" r="2" fill="#000" />
            <circle cx="135" cy="75" r="2" fill="#000" />
            
            <!-- Mulut Terbuka Lebar -->
            <path d="M 50 130 Q 100 180 150 130 L 140 160 Q 100 190 60 160 Z" fill="#400" />
            <!-- Gigi -->
            <path d="M 55 132 L 65 145 L 75 135 L 85 148 L 95 138 L 105 148 L 115 138 L 125 148 L 135 135 L 145 145" fill="none" stroke="white" stroke-width="2" />
        </g>
    </svg>
</div>

<script>
    let scene, camera, renderer, monster, mainLight, ambient;
    let monsterPos = -60, power = 100, hour = 0, isGameOver = false, currentAns = 0;
    let doorL = false, doorR = false, lightL = false, lightR = false;
    let doorMeshL, doorMeshR, spotL, spotR;
    
    let audioCtx, masterGain;

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        
        const drone = audioCtx.createOscillator();
        const dGain = audioCtx.createGain();
        drone.type = 'sine';
        drone.frequency.setValueAtTime(45, audioCtx.currentTime);
        dGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        drone.connect(dGain).connect(masterGain);
        drone.start();
    }

    function playSfx(freq, type, dur, vol, slide = 0) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slide) osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + dur);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(g).connect(masterGain);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function bootSystem() {
        document.getElementById('start-screen').style.display = 'none';
        initAudio();
        init3D();
        document.getElementById('input-box').focus();
    }

    function init3D() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.05);

        camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // Pencahayaan Lebih Cerah
        mainLight = new THREE.PointLight(0xfff0dd, 2.5, 18);
        mainLight.position.set(0, 4, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);

        ambient = new THREE.AmbientLight(0x404040, 0.8); // Lebih terang agar background terlihat
        scene.add(ambient);

        spotL = new THREE.SpotLight(0xffffff, 0, 20, 0.45, 0.5);
        spotL.position.set(-5, 2.5, 3.5);
        spotL.target.position.set(-6, 0, -10);
        scene.add(spotL); scene.add(spotL.target);

        spotR = new THREE.SpotLight(0xffffff, 0, 20, 0.45, 0.5);
        spotR.position.set(5, 2.5, 3.5);
        spotR.target.position.set(6, 0, -10);
        scene.add(spotR); scene.add(spotR.target);

        // Lingkungan dengan Tekstur/Detail Background
        const floorMat = new THREE.MeshStandardMaterial({color: 0x1a1a1a, roughness: 0.1, metalness: 0.3});
        const wallMat = new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.8});

        // Lantai
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 150), floorMat);
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
        scene.add(floor);

        // Langit-langit
        const ceil = new THREE.Mesh(new THREE.PlaneGeometry(60, 150), wallMat);
        ceil.rotation.x = Math.PI/2; ceil.position.y = 5;
        scene.add(ceil);

        // Dinding Kiri & Kanan (Latar Belakang Koridor)
        const sideWallGeo = new THREE.BoxGeometry(1, 10, 150);
        const wallL = new THREE.Mesh(sideWallGeo, wallMat); wallL.position.set(-8, 2.5, -25);
        const wallR = new THREE.Mesh(sideWallGeo, wallMat); wallR.position.set(8, 2.5, -25);
        scene.add(wallL, wallR);

        // Pintu Logam Berat
        const doorGeo = new THREE.BoxGeometry(2.5, 5, 0.4);
        const doorMat = new THREE.MeshStandardMaterial({color: 0x2a2a2a, metalness: 0.9, roughness: 0.2});
        doorMeshL = new THREE.Mesh(doorGeo, doorMat); doorMeshL.position.set(-5.5, 2.5, 2.5);
        doorMeshR = new THREE.Mesh(doorGeo, doorMat); doorMeshR.position.set(5.5, 2.5, 2.5);
        scene.add(doorMeshL); scene.add(doorMeshR);

        // Meja Kerja
        const table = new THREE.Mesh(new THREE.BoxGeometry(4, 0.8, 2), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
        table.position.set(0, 0.4, 4);
        scene.add(table);

        createMonster();
        newQuestion();
        animate();
        loopSystems();

        window.addEventListener('mousemove', (e) => {
            if(isGameOver) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 1.5;
            const y = (e.clientY / window.innerHeight - 0.5) * 0.4;
            camera.rotation.y = -x;
            camera.rotation.x = -y;
        });
    }

    function createMonster() {
        monster = new THREE.Group();
        
        // Badan Humanoid yang Jelas
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.2, 0.6), new THREE.MeshStandardMaterial({color: 0x111111}));
        torso.position.y = 1.1;
        monster.add(torso);
        
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({color: 0x222222}));
        head.position.y = 2.4;
        monster.add(head);

        const arms = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0x111111}));
        arms.position.y = 2.0;
        monster.add(arms);
        
        // Mata Merah yang Jelas Menyala
        const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color: 0xff0000}));
        eyeL.position.set(-0.15, 2.45, 0.45);
        monster.add(eyeL);
        const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color: 0xff0000}));
        eyeR.position.set(0.15, 2.45, 0.45);
        monster.add(eyeR);

        monster.position.set(0, 0, monsterPos);
        scene.add(monster);
    }

    function toggleDoor(side) {
        if(power <= 0 || isGameOver) return;
        playSfx(80, 'square', 0.8, 0.25, 30);
        if(side === 'L') { doorL = !doorL; document.getElementById('door-l').classList.toggle('active', doorL); }
        else { doorR = !doorR; document.getElementById('door-r').classList.toggle('active', doorR); }
    }

    function handleLight(side, state) {
        if(power <= 0 || isGameOver) return;
        if(state) playSfx(1400, 'sine', 0.05, 0.08);
        if(side === 'L') { spotL.intensity = state ? 10 : 0; document.getElementById('light-l').classList.toggle('active', state); }
        else { spotR.intensity = state ? 10 : 0; document.getElementById('light-r').classList.toggle('active', state); }
    }

    function animate() {
        if(isGameOver) return;
        requestAnimationFrame(animate);

        // Animasi Pintu Geser
        doorMeshL.position.y += ((doorL ? 2.5 : 8.5) - doorMeshL.position.y) * 0.15;
        doorMeshR.position.y += ((doorR ? 2.5 : 8.5) - doorMeshR.position.y) * 0.15;

        // Monster AI - Lebih terlihat jelas
        monsterPos += 0.03 + (hour * 0.015);
        monster.position.z = monsterPos;
        monster.position.x = Math.sin(Date.now() * 0.002) * 5.5;

        // Cek Keamanan di Ambang Pintu
        if(monsterPos > 3.0) {
            let blocked = (monster.position.x < -3 && doorL) || (monster.position.x > 3 && doorR);
            if(!blocked) triggerScare();
            else {
                monsterPos = -70;
                newQuestion();
                playSfx(300, 'sawtooth', 0.6, 0.2, 50);
            }
        }

        renderer.render(scene, camera);
    }

    function triggerScare() {
        isGameOver = true;
        camera.lookAt(monster.position);
        camera.position.z = 4.2; // Kamera mendekat paksa
        mainLight.color.setHex(0xff0000);
        mainLight.intensity = 25;

        // Audio Jumpscare
        for(let i=0; i<15; i++) {
            setTimeout(() => playSfx(40 + Math.random()*3000, 'sawtooth', 2.5, 0.6, 5), i*25);
        }

        setTimeout(() => {
            const layer = document.getElementById('jumpscare-layer');
            layer.style.display = 'flex';
            
            let frame = 0;
            const jitter = setInterval(() => {
                const x = (Math.random()-0.5)*70;
                const y = (Math.random()-0.5)*70;
                layer.style.transform = `scale(${1.3 + Math.random()*0.5}) translate(${x}px, ${y}px)`;
                frame++;
                if(frame > 80) {
                    clearInterval(jitter);
                    alert("SISTEM GAGAL. SUBJEK TERELIMINASI.");
                    location.reload();
                }
            }, 30);
        }, 50);
    }

    function loopSystems() {
        setInterval(() => {
            if(isGameOver) return;
            let usage = 0.25;
            if(doorL) usage += 2.0; if(doorR) usage += 2.0;
            if(spotL.intensity > 0) usage += 1.5; if(spotR.intensity > 0) usage += 1.5;
            
            power -= usage / 5.5;
            document.getElementById('power-val').innerText = Math.max(0, Math.floor(power)) + "%";
            
            if(power <= 0) {
                mainLight.intensity = 0;
                ambient.intensity = 0.1;
                doorL = doorR = false;
                playSfx(40, 'sawtooth', 1.5, 0.4);
            }
        }, 200);

        setInterval(() => {
            if(isGameOver) return;
            hour++;
            document.getElementById('clock-val').innerText = hour;
            if(hour >= 6) {
                alert("JAM 06:00 AM - OPERASI BERHASIL. ANDA SELAMAT.");
                location.reload();
            }
        }, 45000);
    }

    function newQuestion() {
        const a = Math.floor(Math.random()*90) + 10;
        const b = Math.floor(Math.random()*90) + 10;
        currentAns = a + b;
        document.getElementById('question-text').innerText = `${a} + ${b}`;
    }

    document.getElementById('input-box').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            if(parseInt(e.target.value) === currentAns) {
                playSfx(1100, 'sine', 0.15, 0.12);
                monsterPos = -70;
                newQuestion();
                e.target.value = '';
            } else {
                playSfx(180, 'square', 0.4, 0.25);
                monsterPos += 15;
                e.target.value = '';
            }
        }
    });
</script>
</body>
</html>
